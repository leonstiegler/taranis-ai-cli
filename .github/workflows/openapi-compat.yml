name: OpenAPI Compatibility

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  check-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate against latest Taranis release OpenAPI
        run: python tools/check_openapi_compat.py
